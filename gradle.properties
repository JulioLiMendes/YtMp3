org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Obrigatório: sem isso, dependências AndroidX (Room, Media3, Compose, etc.)
# fazem o build falhar em checkDebugAarMetadata.
android.useAndroidX=true

# Recomendado para projetos novos com Compose/AndroidX: gera classes R
# não-transitivas por módulo (builds mais rápidos, menos conflitos de recursos).
android.nonTransitiveRClass=true

kotlin.code.style=official
